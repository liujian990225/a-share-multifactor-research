project:
  name: a_share_multifactor_baostock
  random_seed: 42

data:
  # Main pipeline reads project-standard CSVs generated by scripts/fetch_baostock_data.py.
  source: csv
  csv:
    prices_path: data/raw/baostock/prices.csv
    fundamentals_path: data/raw/baostock/fundamentals.csv
    benchmark_path: data/raw/baostock/benchmark.csv
    membership_path: data/raw/baostock/membership.csv

  baostock:
    output_dir: data/raw/baostock
    start_date: "2020-01-01"
    end_date: "2024-12-31"
    benchmark_code: "sh.000300"
    # 2 = 前复权, 1 = 后复权, 3 = 不复权. For strategy return research, 2 is recommended.
    adjustflag: "2"
    request_pause: 0.20
    retries: 3
    # Start small to make the first run faster. Increase after the full pipeline runs successfully.
    max_symbols: 30
    # You may use a custom list instead of max_symbols, for example:
    # symbols: ["600519.SH", "000001.SZ", "300750.SZ", "600036.SH"]

backtest:
  start_date: "2021-01-01"
  end_date: "2024-12-31"
  rebalance_freq: M
  execution_lag: 1
  top_n: 20
  top_pct: null
  transaction_cost_bps: 10
  benchmark_name: CSI300
  industry_neutral_selection: true
  min_listed_days: 180
  min_avg_amount: 5000000

factor:
  neutralize: true
  neutralize_size: true
  winsorize_method: mad
  mad_n: 3.0
  ic_lookback: 12
  min_ic_obs: 6
  quantiles: 5
  # BaoStock free daily data has strong value/price/liquidity coverage.
  # Quality defaults are neutral unless you later add point-in-time financial fields.
  category_weights:
    value: 0.30
    quality: 0.05
    momentum: 0.25
    low_volatility: 0.20
    liquidity: 0.20

analysis:
  sensitivity:
    top_n_list: [10, 20, 30]
    cost_bps_list: [5, 10, 20]
  regime:
    lookback_days: 120
    bull_threshold: 0.10
    bear_threshold: -0.10

ml:
  enabled: true
  model_type: random_forest
  n_estimators: 50
  max_depth: 3
  train_window_months: 24
  min_train_months: 12
  validation_months: 6
  rank_target: true
  factor_ic_forecast: true
  ic_model_type: random_forest
  ic_feature_lookback: 12
  ic_min_train_rows: 50

reports:
  output_dir: reports/baostock_run
  save_figures: true
  save_csv: true
